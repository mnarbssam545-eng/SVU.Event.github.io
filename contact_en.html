<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Directory | Contact Us</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal&family=Cairo&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="index_en.html">
                    <img src="assets/img/logo.png" alt="SVU Events" height="40">
                    SVU Events
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index_en.html">Home</a></li>
                        <li class="nav-item">
                            <a class="nav-link" href="events_en.html">Events</a></li>
                        <li class="nav-item">
                            <a class="nav-link" href="about_en.html">About</a></li>
                        <li class="nav-item">
                            
                            <a class="nav-link active" href="contact_en.html">Contact Us</a></li>
                        <li class="nav-item">
                            <a class="nav-link fw-bold text-primary" href="contact.html">العربية</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-5 mb-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4 text-center text-primary">Contact Us</h2>
                
                <div class="bg-white p-4 rounded shadow-sm">
                    <form id="contactForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" id="name" class="form-control" placeholder="Enter your name here">
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-control" placeholder="example@domain.com">
                        </div>
                        
                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea id="message" class="form-control" rows="5" placeholder="Write your message here..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 fs-5">Send Message</button>
                        
                        <div id="alertBox" class="mt-3"></div>
                    </form>
                </div>

                <div class="mt-5 text-center">
                    <h4 class="mb-3">Other Ways to Connect</h4>
                    <p class="mb-1">📧 Email: info@svuevents.com</p>
                    <p>📍 Location: Syrian Virtual University</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white pt-4 pb-2 mt-auto">
        <div class="container text-center">
            <p>© All Rights Reserved</p>
            <div class="d-flex justify-content-center gap-3 mt-3">
                <a href="#"><img src="assets/img/linkedin.png" alt="LinkedIn" width="30"></a>
                <a href="#"><img src="assets/img/facebook.png" alt="Facebook" width="30"></a>
                <a href="#"><img src="assets/img/youtube.png" alt="YouTube" width="30"></a>
                <a href="#"><img src="assets/img/google.png" alt="SVU" width="30"></a>
                <a href="#"><img src="assets/img/insta.png" alt="Instagram" width="30"></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
