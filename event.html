            </div>

            <div class="col-md-7">
                <h1 id="title" class="text-primary mb-3">جاري التحميل...</h1>
                
                <div class="d-flex gap-4 mb-4 text-muted">

                     <span > <img src="assets/img/location.jpeg" alt="SVU Events" height="100">  </span>

        <div class="modal fade" id="bookingModal" tabindex="-1" aria-labelledby="bookingModalLabel" aria-hidden="true">

        <div class="modal-content">

            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                <button type="button" class="btn btn-success" data-bs-dismiss="modal" onclick="alert('تم تأكيد الحجز بنجاح!')">تأكيد الحجز</button>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        const events = {
            1: { title: "مهرجان ثقافي", date: "2026-05-10", location: "دمشق", description: "مهرجان ثقافي متنوع يجمع بين الفنون الأدبية والموسيقية والتراثية، ويهدف إلى تعزيز الهوية الثقافية وإبراز المواهب المحلية.", image: "assets/img/event1.jpg" },
            2: { title: "بطولة رياضية", date: "2026-05-12", location: "حلب", description: "بطولة رياضية تجمع طلاب الجامعات في منافسات كرة القدم وكرة السلة وألعاب القوى.", image: "assets/img/event2.jpg" },
            3: { title: "ورشة عمل", date: "2026-05-18", location: "اونلاين", description: "ورشة تدريبية لتعليم أساسيات HTML و CSS موجهة للمبتدئين.", image: "assets/img/event3.jpg" },
            4: { title: "حفلة موسيقية", date: "2026-05-20", location: "حمص", description: "حفلة موسيقية تضم فرق شبابية تقدم عروضاً حية متنوعة.", image: "assets/img/event4.jpg" },
            5: { title: "معرض فني تشكيلي", date: "2025-05-01", location: "حمص", description: "معرض يضم لوحات فنية لفنانين محليين تعكس قضايا اجتماعية.", image: "assets/img/event5.jpg" },
            6: { title: "يوم العائلة الترفيهية", date: "2025-07-05", location: "طرطوس", description: "يوم مفتوح للعائلات يضم ألعاباً وأنشطة ترفيهية.", image: "assets/img/event6.jpg" },
            7: { title: "ندوة ريادة الأعمال", date: "2025-10-09", location: "دمشق", description: "ندوة يقدمها رواد أعمال لمشاركة تجاربهم ونصائحهم.", image: "assets/img/event7.jpg" },
            8: { title: "ماراثون المدينة", date: "2025-10-25", location: "حلب", description: "سباق جري مفتوح يهدف لتعزيز النشاط البدني.", image: "assets/img/event8.jpg" },
            9: { title: "ورشة تصوير فوتوغرافي", date: "2025-11-04", location: "اللاذقية", description: "ورشة تعليمية لأساسيات التصوير والإضاءة.", image: "assets/img/event9.jpg" },
            10: { title: "معرض تكنولوجيا حديثة", date: "2025-11-13", location: "اونلاين", description: "معرض يعرض أحدث الابتكارات التقنية.", image: "assets/img/event10.jpg" },
            11: { title: "أمسية شعرية", date: "2025-11-24", location: "دمشق", description: "أمسية ثقافية يشارك فيها شعراء يقدمون قصائد متنوعة.", image: "assets/img/event11.jpg" },
            12: { title: "ورشة تصميم جرافيك", date: "2026-01-15", location: "حمص", description: "ورشة لتعلم التصميم باستخدام أدوات حديثة.", image: "assets/img/event12.jpg" },
            13: { title: "حفلة تخرج طلابية", date: "2026-01-30", location: "دمشق", description: "احتفال رسمي بتخرج الطلاب.", image: "assets/img/event13.jpg" },
            14: { title: "سوق خيري", date: "2026-02-25", location: "طرطوس", description: "فعالية لبيع منتجات لدعم مشاريع خيرية.", image: "assets/img/event14.jpg" },
            15: { title: "مسابقة برمجة", date: "2026-03-01", location: "اونلاين", description: "مسابقة لحل مشاكل برمجية ضمن وقت محدد.", image: "assets/img/event15.jpg" }
        };

        const event = events[id];

        if(event){
            document.getElementById("title").textContent = event.title;
            document.getElementById("date").textContent = "📅 " + event.date;
            document.getElementById("location").textContent = "📍 " + event.location;
            document.getElementById("description").textContent = event.description;
            document.getElementById("mainImage").src = event.image;
        } else {
            document.getElementById("title").textContent = "الفعالية غير موجودة";
            document.getElementById("description").textContent = "يرجى العودة للصفحة السابقة واختيار فعالية صحيحة.";
        }
